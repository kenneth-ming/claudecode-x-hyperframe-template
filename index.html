  <style>
    @font-face {

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #000;
      font-family: 'Noto Sans TC', system-ui, sans-serif;
    }
    #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; }

    /* ══ Liquid Glass panel ══
       Semi-transparent: navy tint + backdrop-filter lets video show through,
       specular highlights on edges fake the iOS-26 refraction look.         */
    .glass-panel {
      position: absolute; border-radius: 34px; overflow: hidden;
      background: linear-gradient(
        148deg,
        rgba(10,37,64,0.52) 0%,
        rgba(10,37,64,0.28) 38%,
        rgba(10,37,64,0.22) 62%,
        rgba(10,37,64,0.40) 100%
      );
      backdrop-filter: blur(26px) saturate(1.60) brightness(1.08);
      -webkit-backdrop-filter: blur(26px) saturate(1.60) brightness(1.08);
      border: 1px solid rgba(245,247,250,0.26);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.52),
        inset 0 -1px 0 rgba(255,255,255,0.07),
        0 20px 72px rgba(0,0,0,0.50),
        0 0 0 0.5px rgba(255,255,255,0.05),
        0 0 0 1.5px rgba(201,162,39,0.18);
    }
    .glass-panel::before {
      content: '';
      position: absolute; inset: 1px; border-radius: inherit; pointer-events: none;
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0.36),
        transparent 24%,
        transparent 70%,
        rgba(255,255,255,0.13)
      );
      opacity: 0.32; mix-blend-mode: screen;
    }

    /* ══ Gold glow bursts (screen-blend over everything) ══ */
    .glow-burst {
      position: absolute; border-radius: 50%;
      pointer-events: none; z-index: 8;
      mix-blend-mode: screen; opacity: 0;
    }
    #gold-glow1 {
      width: 680px; height: 560px;
      left: 200px; top: 390px;
      background: radial-gradient(ellipse, rgba(230,197,92,0.68) 0%, rgba(201,162,39,0.32) 36%, transparent 70%);
      filter: blur(34px);
    }
    #gold-glow2 {
      width: 1000px; height: 860px;
      left: 40px; top: 280px;
      background: radial-gradient(ellipse, rgba(255,232,105,0.82) 0%, rgba(230,197,92,0.52) 20%, rgba(201,162,39,0.20) 50%, transparent 72%);
      filter: blur(26px);
    }

    /* ══ Film grain (deterministic CSS, no PNG) ══ */
    .grain {
      position: absolute; inset: 0; z-index: 14; pointer-events: none; opacity: 0.038;
      background-image:
        radial-gradient(circle, rgba(255,255,255,1) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,1) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,1) 1px, transparent 1px);
      background-size: 3px 3px, 5px 5px, 7px 7px;
      background-position: 0 0, 1px 2px, 2px 1px;
    }
  </style>
</head>
<body>

    <!-- ══ Grain ══ -->

  <script>
    var DURATION = 6.04;

    /* ════════════════════════════════════════════════════════════════
       GSAP TIMELINE
       Video plays independently — GSAP owns only the overlay elements.
    ════════════════════════════════════════════════════════════════ */
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    tl.set("#card-content", { x: 0, y: 0, data: "hf-hold" }, 0);

    tl.set("#header", { y: -24, x: 0, data: "hf-hold" }, 0);

    tl.set("#glass-card", { y: 60, x: 0, data: "hf-hold" }, 0);

    tl.set("#gold-glow2", { x: 0, y: 0, data: "hf-hold" }, 0);

    tl.set("#price-block2", { y: -50, data: "hf-hold" }, 0);

    tl.set("#strike-line", { yPercent: 0, y: -100, data: "hf-hold" }, 0);

    tl.set("#gold-glow1", { x: 0, y: -181, data: "hf-hold" }, 0);

    tl.set("#card-content-split", {
      opacity: 1,
      x: 0
    }, 4.436);

    /* ── Initial hidden states (GSAP owns all transforms) ── */
    gsap.set("#header",       { opacity: 0, y: -24 });
    gsap.set("#glass-card",   { opacity: 0, y: 60, scale: 0.96 });
    gsap.set("#card-content", { opacity: 0 });
    gsap.set("#price-block1", { opacity: 0, scale: 0.52, y: 18 });
    gsap.set("#price-block2", { opacity: 0, scale: 0.26 });
    gsap.set("#strike-line",  { scaleX: 0, yPercent: -50 });
    gsap.set("#gold-glow1",   { opacity: 0, scale: 0.82 });
    gsap.set("#gold-glow2",   { opacity: 0, scale: 0.48 });

    /* ── Beat 1 · NT$100,000 punch (1.70s) ── */
    tl.to("#price-block1",
      { opacity: 1, scale: 1, y: 0, duration: 0.33, ease: "back.out(2.8)" }, 1.70);
    tl.to("#gold-glow1", {
      keyframes: { "0%": { opacity: 1, scale: 1, x: 0, y: -181 }, "100%": { opacity: 0, scale: 1.7, x: 0, y: -171 }, easeEach: "power2.in" },
      duration: 0.56,
      ease: "none"
    }, 1.88);

    /* ── Beat 2 · NT$50 reveal — THE HIGH POINT (3.60s) ── */
    /* Red strikethrough slashes across NT$100,000 */
    tl.to("#strike-line",
      {
        keyframes: { "0%": {
          scaleX: 1,
          yPercent: 0,
          transformOrigin: "left center",
          y: -100
        }, "100%": { scaleX: 1, yPercent: -50, y: -140 }, easeEach: "power3.out" },
        duration: 0.20,
        ease: "none"
      }, 3.60);
    /* NT$100,000 dims + retreats */
    tl.to("#price-block1",
      { opacity: 0.26, scale: 0.80, y: -48, duration: 0.38, ease: "power2.in" }, 3.60);
    /* NT$50 erupts with elastic overshoot */
    tl.to("#price-block2",
      {
        keyframes: {
          "38.3%": { opacity: 0.972, scale: 0, y: -50 },

          "100%": {
            opacity: 1,
            scale: 1,
            y: -50
          },

          easeEach: "power2.inOut"
        },

        duration: 0.7
      }, 3.76);
    tl.to("#gold-glow2", {
      keyframes: {
        "0%": { opacity: 1, scale: 1, x: 0, y: 0 },
        "6.1%": { x: -22, y: 0, opacity: 1, scale: 1 },

        "17.5%": {
          opacity: 0.999,
          scale: 1.001,
          y: 0,
          x: -21.3783
        },

        "34.7%": { x: 0, y: -146 },
        "80.7%": { x: -22, y: -253 },

        "100%": {
          opacity: 0,
          scale: 1.86,
          x: 0,
          y: 0
        },

        easeEach: "power2.in"
      },
      duration: 1.306,
      ease: "none"
    }, 3.92);

    /* ── Beat 3 · Glass card collapses at 5.0s (video keeps rolling) ── */
    tl.to(["#glass-card", "#card-content", "#header"],
      { opacity: 0, duration: 0.62, ease: "custom(M0,0 C0.45,0.05 0.92,0.97 1,1)" }, 5.00);

    /* ── Law #11 — timeline must fill its slot ── */
    tl.to({}, { duration: DURATION }, 0);

    tl.to("#glass-card", { opacity: 1, duration: 0.5, ease: "back.out(1.4)" }, 0.277);

    tl.to("#glass-card", { keyframes: {
      "0%": { y: 60, x: 0 },
      "97.3%": { x: 0, y: -155 },
      easeEach: "back.out(1.4)"
    }, duration: 0.5, ease: "none" }, 0.277);

    tl.to("#glass-card", { scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 0.277);

    tl.to("#header", { opacity: 1, duration: 0.52, ease: "power3.out" }, 0.1);

    tl.to("#header", { keyframes: { "0%": { y: -24, x: 0 }, "100%": { y: 95, x: 0 }, easeEach: "power3.out" }, duration: 0.52, ease: "none" }, 0.1);

    tl.to("#card-content", { keyframes: { "0%": { opacity: 1 }, "100%": { opacity: 1 } }, duration: 0.478, ease: "power2.out" }, 2.923);

    tl.to("#card-content", { keyframes: { "100%": { height: 720 } }, duration: 0.478, ease: "power2.out" }, 2.923);

    tl.set("#price-100k", { x: 0, y: -104 }, 0);

    tl.to("#card-content", { keyframes: { "0%": { opacity: 1 }, "26%": { opacity: 1 } }, duration: 0.05 }, 4.707);

    tl.to("#card-content", { keyframes: { "26%": { height: 720 } }, duration: 1.834 }, 2.923);

    tl.to("#card-content", { keyframes: {
      "0%": { x: 0, y: 0 },
      "25.88%": { x: 0, y: 0 },
      "57.7%": { x: 0, y: -100 },
      easeEach: "custom(M0,0 C0.79,0.1 1,1 1,1)"
    }, duration: 1.839 }, 2.923);

    tl.to("#gold-glow1", { opacity: 0.78, duration: 0.18, ease: "power3.out" }, 1.7);

    tl.to("#gold-glow1", { scale: 1.05, duration: 0.18, ease: "power3.out" }, 1.7);

    tl.to("#gold-glow2", { opacity: 1, duration: 0.158, ease: "none" }, 3.762);

    tl.to("#gold-glow2", { scale: 1, duration: 0.158, ease: "none" }, 3.762);

    window.__timelines["claude-code-pip"] = tl;
  </script>
